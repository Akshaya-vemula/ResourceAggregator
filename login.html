<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Optern</title>
  <style>
    /* ===== TOAST STYLING ===== */
    .toast {
  position: fixed;
  /* Start hidden and slightly lower than the middle */
  top: 55%; 
  left: 50%;
  transform: translate(-50%, -50%); /* Centers it perfectly */
  padding: 16px 30px;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  font-size: 15px;
  z-index: 1000;
  
  /* Smooth fade and slide up effect */
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  text-align: center;
}

/* When the "show" class is added */
.toast.show {
  top: 50%; /* Moves to the exact middle */
  opacity: 1;
  visibility: visible;
}

.toast.success { background: #22c55e; border: 1px solid #16a34a; }
.toast.error { background: #ef4444; border: 1px solid #dc2626; }

    /* ===== GENERAL STYLING ===== */
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: #e9eef3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper { width: 100%; max-width: 1000px; padding: 20px; }

    .card {
      display: flex;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      background: white;
    }

    /* LEFT SIDE */
    .left {
      width: 50%;
      background: linear-gradient(135deg, #0f4c75, #1b6ca8);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: white;
    }

    .branding { text-align: center; max-width: 320px; }
    .branding img {
      width: 90px; margin-bottom: 20px;
      background: white; padding: 14px; border-radius: 14px;
    }
    .branding h1 { font-size: 32px; margin-bottom: 12px; }
    .branding p { font-size: 15px; line-height: 1.6; opacity: 0.9; }

    /* RIGHT SIDE */
    .right { width: 50%; padding: 50px 40px; }
    .right h2 { font-size: 28px; margin-bottom: 6px; color: #0f4c75; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }

    label { font-size: 13px; color: #333; margin-bottom: 6px; display: block; }

    .input-box { position: relative; margin-bottom: 20px; }
    .input-box input {
      width: 100%; padding: 12px 40px;
      border-radius: 8px; border: 1px solid #ccc; outline: none;
    }
    .input-box span {
      position: absolute; top: 50%; transform: translateY(-50%);
      left: 12px; font-size: 14px; opacity: 0.6;
    }

    .input-box input:focus {
      border-color: #1b6ca8;
      box-shadow: 0 0 0 2px rgba(27,108,168,0.2);
    }

    .options {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 13px; margin-bottom: 25px;
    }
    .options a { text-decoration: none; color: #1b6ca8; }

    button {
      width: 100%; padding: 12px;
      background: #0f4c75; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #1b6ca8; }

    .signup { margin-top: 22px; font-size: 14px; text-align: center; }
    .signup a { color: #0f4c75; font-weight: 600; text-decoration: none; }

    @media (max-width: 768px) {
      .card { flex-direction: column; }
      .left, .right { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <div class="wrapper">
    <div class="card">
      <div class="left">
        <div class="branding">
          <img src="logo.png" alt="Logo">
          <h1>Welcome Back</h1>
          <p>Unlock your learning potential. Access courses, track progress, and achieve your academic goals.</p>
        </div>
      </div>

      <div class="right">
        <h2>Sign In</h2>
        <p class="subtitle">Enter your credentials to access your account</p>

        <form id="loginForm">
          <label for="userEmail">Email Address</label>
          <div class="input-box">
            <span>✉️</span>
            <input type="email" id="userEmail" placeholder="you@example.com" required>
          </div>

          <label for="userPass">Password</label>
          <div class="input-box">
            <span>🔒</span>
            <input type="password" id="userPass" placeholder="••••••••" required>
          </div>

          <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" id="loginBtn">Sign In →</button>
        </form>

        <p class="signup">
          Don’t have an account? <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { 
      apiKey: "AIzaSyCMs8aWDbSi39CYKoOvedmHsBin7TcxRZk", 
      authDomain: "resource-aggregator-fa6b2.firebaseapp.com", 
      projectId: "resource-aggregator-fa6b2", 
      storageBucket: "resource-aggregator-fa6b2.firebasestorage.app", 
      messagingSenderId: "484510576214", 
      appId: "1:484510576214:web:49ea02c80a09f0e473d5f7" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Toast Logic
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.className = `toast show ${type}`;
      
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // Login Logic
    const loginForm = document.getElementById('loginForm');
    
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('userEmail').value;
      const password = document.getElementById('userPass').value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          showToast("Welcome Back! ", "success");
          setTimeout(() => {
            window.location.href = "home.html";
          }, 1500);
        })
        .catch((error) => {
          let msg = "Invalid email or password";
          if (error.code === 'auth/network-request-failed') {
            msg = "Network error. Please check your internet connection.";
          }
          console.error("Firebase Auth Error:", error.code);
          showToast(msg, "error");
        });
    });
  </script>
</body>
</html>
