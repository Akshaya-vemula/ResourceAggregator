<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optern – Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #e9eef3;
      height: 100vh;
      display: flex;
      padding: 20px;
    }

    .card {
      width: 100%;
      display: flex;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #0f4c75, #1b6ca8);
      color: #fff;
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand { text-align: center; margin-bottom: 25px; }
    .sidebar-logo {
      width: 60px; height: 60px; background: #fff; border-radius: 14px;
      margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
    }
    .sidebar-logo img { width: 40px; }
    .sidebar-brand h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sidebar-brand p { font-size: 12px; opacity: 0.8; }

    .user-profile {
      display: flex; align-items: center; gap: 12px;
      padding: 15px; background: rgba(255, 255, 255, 0.15);
      border-radius: 16px; margin: 20px 0;
    }
    .profile-icon {
      width: 42px; height: 42px; background: #fff; color: #0f4c75;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; flex-shrink: 0;
    }
    .user-info span { font-size: 14px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; }

    .nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav a {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 12px; text-decoration: none; color: rgba(255,255,255,0.7); font-size: 15px;
    }
    .nav a.active, .nav a:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .logout {
      margin-top: auto; display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      color: #fff; cursor: pointer; font-family: inherit; transition: 0.3s;
    }
    .logout:hover { background: rgba(255, 255, 255, 0.2); }

    .main { flex: 1; padding: 40px; overflow-y: auto; }
    .section-title { font-size: 24px; font-weight: 700; color: #0f4c75; margin-bottom: 25px; }

    .continue-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 30px; margin-bottom: 40px; }
    .progress-bar { height: 10px; background: #e2e8f0; border-radius: 10px; margin: 15px 0; overflow: hidden; }
    .progress-fill { height: 100%; width: 62%; background: #0f4c75; }
    .resume-btn { padding: 12px 24px; background: #0f4c75; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .view-all { text-decoration: none; color: #0f4c75; font-weight: 700; }

    .skill-grid-preview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .skill-card-small { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
    .skill-card-small:hover { transform: translateY(-5px); border-color: #0f4c75; }
    .skill-card-small img { width: 40px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo"><img src="logo.png" alt="Logo"></div>
        <h2>Optern</h2>
        <p>Learn. Build. Grow.</p>
        <div class="user-profile">
          <div class="profile-icon" id="userInitial">U</div>
          <div class="user-info"><span id="userNameDisplay">User</span></div>
        </div>
      </div>
      <nav class="nav">
        <a href="home.html" class="active">🏠 Home</a>
        <a href="skillspage.html">⚡ Skills</a>
        <a href="roadmap.html">🗺️ Roadmap</a>
        <a href="analytics.html">📊 Analytics</a>
      </nav>
      <button class="logout" id="logoutBtn">🚪 Logout</button>
    </aside>

    <main class="main">
      <h1 class="section-title">Continue Learning</h1>
      <div class="continue-card">
        <h3>Python</h3>
        <p style="font-size: 14px; color: #64748b;">Progress: 62%</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <button class="resume-btn">Resume Roadmap →</button>
      </div>

      <div class="header-flex">
        <h1 class="section-title">Pick Your Next Skill</h1>
        <a href="skillspage.html" class="view-all">View All ➔</a>
      </div>

      <div class="skill-grid-preview">
        <div class="skill-card-small"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg"><p>Frontend</p></div>
        <div class="skill-card-small"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg"><p>Backend</p></div>
        <div class="skill-card-small"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg"><p>DSA</p></div>
        <div class="skill-card-small"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/postgresql/postgresql-original.svg"><p>Databases</p></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
      apiKey: "AIzaSyCMs8aWDbSi39CYKoOvedmHsBin7TcxRZk", 
      authDomain: "resource-aggregator-fa6b2.firebaseapp.com", 
      projectId: "resource-aggregator-fa6b2", 
      storageBucket: "resource-aggregator-fa6b2.firebasestorage.app", 
      messagingSenderId: "484510576214", 
      appId: "1:484510576214:web:49ea02c80a09f0e473d5f7" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        // THIS LINE SHOWS THE ID ON YOUR SCREEN
       
        document.getElementById('userNameDisplay').innerText = user.email.split('@')[0];
        document.getElementById('userInitial').innerText = user.email.charAt(0).toUpperCase();
        
        try {
          const userRef = doc(db, "users", user.uid); 
          const userSnap = await getDoc(userRef);

          if (userSnap.exists()) {
            const data = userSnap.data();
            document.querySelector('.continue-card h3').innerText = data.currentSkill || "No Skill Selected";
            document.querySelector('.progress-fill').style.width = (data.progress || 0) + "%";
            document.querySelector('.continue-card p').innerText = `Progress: ${data.progress || 0}%`;
          }
        } catch (error) {
          console.error("Error fetching user data:", error);
        }
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = "login.html");
    });
  </script>
</body>
</html>
