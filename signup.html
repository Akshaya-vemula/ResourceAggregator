<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="signup.css">
  <style>
    /* ===== NEW: Centered Toast Styling ===== */
    .toast {
      position: fixed;
      top: 55%; 
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 30px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 15px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      text-align: center;
    }

    .toast.show {
      top: 50%; 
      opacity: 1;
      visibility: visible;
    }

    .toast.success { background: #22c55e; border: 1px solid #16a34a; }
    .toast.error { background: #ef4444; border: 1px solid #dc2626; }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
  <div class="card">

    <div class="left">
      <img src="logo.png" alt="Logo">
      <h1>Join Us Today</h1>
      <p>
        Start your learning journey. Create an account
        to access courses, track progress, and achieve
        your goals.
      </p>
    </div>

    <div class="right">
      <h2>Create Account</h2>
      <p class="subtitle">Fill in the details to get started</p>

      <div class="role">
        <label class="active">
          <input type="radio" name="role" id="roleStudent" value="Student" checked>
          Student
        </label>
      </div>

      <form id="signupForm">
        <div class="row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="John" required>
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" required>
          </div>
        </div>

        <div class="field">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="row">
          <div class="field">
            <label>College / University</label>
            <input type="text" id="college" placeholder="e.g. MIT, Stanford" required>
          </div>
          <div class="field">
            <label>Year of Study</label>
            <select id="year" required>
              <option value="">Select year</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Branch</label>
            <input type="text" id="branch" placeholder="e.g. CSE, ECE" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="password" required>
            <label>Verify Password</label>
            <input type="password" id="confirmPassword" required>
          </div>
        </div>

        <button type="submit">Register →</button>
      </form>

      <p class="login-link">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCMs8aWDbSi39CYKoOvedmHsBin7TcxRZk",
    authDomain: "resource-aggregator-fa6b2.firebaseapp.com",
    projectId: "resource-aggregator-fa6b2",
    storageBucket: "resource-aggregator-fa6b2.firebasestorage.app",
    messagingSenderId: "484510576214",
    appId: "1:484510576214:web:49ea02c80a09f0e473d5f7",
    measurementId: "G-HFR7WC7G3Y"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Toast Function
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    toast.className = `toast show ${type}`;
    
    setTimeout(() => {
      toast.className = 'toast';
    }, 3000);
  }

  const signupForm = document.getElementById('signupForm');

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const college = document.getElementById('college').value;
    const year = document.getElementById('year').value;
    const branch = document.getElementById('branch').value;
    const role = document.querySelector('input[name="role"]:checked').value;

    if (password !== confirmPassword) {
      showToast("Passwords do not match!", "error");
      return;
    }

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        firstName: firstName,
        lastName: lastName,
        email: email,
        college: college,
        year: year,
        branch: branch,
        role: role,
        createdAt: new Date(),
        currentSkill: "None",
        progress: 0
      });

      showToast("Registration Successful! Redirecting...", "success");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 2000);

    } catch (error) {
      console.error("Error signing up:", error);
      let msg = error.message;
      if (error.code === 'auth/email-already-in-use') msg = "This email is already registered.";
      showToast(msg, "error");
    }
  });
</script>
</body>
</html>
