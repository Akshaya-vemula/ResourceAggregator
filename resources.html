<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optern – Learning Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #e9eef3;
      height: 100vh;
      display: flex;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      width: 100%;
      display: flex;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #0f4c75, #1b6ca8);
      color: #fff;
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand { text-align: center; margin-bottom: 20px; }
    .sidebar-logo { width: 60px; height: 60px; background: #fff; border-radius: 14px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
    .sidebar-logo img { width: 40px; }
    
    .user-profile { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255, 255, 255, 0.15); border-radius: 16px; margin: 20px 0; }
    .profile-icon { width: 42px; height: 42px; background: #fff; color: #0f4c75; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }

    .nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: rgba(255,255,255,0.7); font-size: 15px; }
    .nav a:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .logout { margin-top: auto; display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; cursor: pointer; font-family: inherit; }

    /* ===== MAIN RESOURCES AREA ===== */
    .main { flex: 1; padding: 40px; overflow-y: auto; }
    .back-btn { color: #0f4c75; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-block; margin-bottom: 20px; }
    .skill-title { font-size: 32px; color: #0f4c75; margin-bottom: 5px; }
    .skill-desc { color: #64748b; font-size: 15px; margin-bottom: 30px; }

    .roadmap-container { display: flex; flex-direction: column; gap: 25px; }
    .step-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

    .step-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .step-num { width: 35px; height: 35px; background: #0f4c75; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .step-header h3 { color: #1e293b; font-size: 20px; }

    .resource-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
    .res-box { padding: 15px; border-radius: 12px; text-decoration: none; display: flex; flex-direction: column; gap: 5px; transition: 0.2s; border: 1px solid #f1f5f9; cursor: pointer; }

    .res-video { background: #fff5f5; border-left: 4px solid #ff4d4d; }
    .res-doc { background: #f0fdf4; border-left: 4px solid #22c55e; }
    .res-practice { background: #eff6ff; border-left: 4px solid #3b82f6; }

    .res-box:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .res-type { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; }
    .res-name { font-size: 14px; font-weight: 600; color: #1e293b; }

    /* ACTION BUTTONS */
    .action-area { text-align: center; margin-top: 50px; padding-bottom: 40px; }
    .complete-btn { padding: 15px 35px; background: #0f4c75; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
    .complete-btn:hover { background: #1b6ca8; transform: translateY(-2px); }
    .complete-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    /* TOAST STYLING */
    .toast { position: fixed; top: 55%; left: 50%; transform: translate(-50%, -50%); padding: 16px 30px; border-radius: 12px; color: white; font-weight: 600; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.4s; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .toast.show { top: 50%; opacity: 1; visibility: visible; }
    .toast.success { background: #22c55e; }

    @media (max-width: 900px) { .resource-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <div class="card">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo"><img src="logo.png" alt="🎓"></div>
        <h2>Optern</h2>
        <p>Learn. Build. Grow.</p>
        <div class="user-profile">
          <div class="profile-icon" id="userInitial">U</div>
          <div class="user-info"><span id="userNameDisplay">User</span></div>
        </div>
      </div>
      <nav class="nav">
        <a href="home.html">🏠 Home</a>
        <a href="skillspage.html">⚡ Skills</a>
        <a href="roadmap.html">🗺️ Roadmap</a>
        <a href="analytics.html">📊 Analytics</a>
      </nav>
      <button class="logout" id="logoutBtn">🚪 Logout</button>
    </aside>

    <main class="main">
      <a href="skillspage.html" class="back-btn">← Back to Skills</a>
      <h1 class="skill-title" id="skillName">Loading...</h1>
      <p class="skill-desc">Follow this structured path from basics to advanced practice.</p>

      <div class="roadmap-container" id="roadmapContent"></div>

      <div class="action-area">
        <button id="completeSkillBtn" class="complete-btn">🎯 Mark Skill Step as Completed</button>
      </div>
    </main>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 1. Firebase Configuration
  const firebaseConfig = { 
    apiKey: "AIzaSyCMs8aWDbSi39CYKoOvedmHsBin7TcxRZk", 
    authDomain: "resource-aggregator-fa6b2.firebaseapp.com", 
    projectId: "resource-aggregator-fa6b2", 
    storageBucket: "resource-aggregator-fa6b2.firebasestorage.app", 
    messagingSenderId: "484510576214", 
    appId: "1:484510576214:web:49ea02c80a09f0e473d5f7" 
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 2. URL and DOM Elements
  const urlParams = new URLSearchParams(window.location.search);
  const selectedSkill = urlParams.get('skill') || "Frontend";
  document.getElementById('skillName').innerText = selectedSkill;
  const roadmapContainer = document.getElementById('roadmapContent');

  // 3. Dynamic Data Fetching from Firestore
  async function loadRoadmapFromFirestore() {
    try {
      // Fetches the document from the 'roadmaps' collection that matches the skill name
      const roadmapRef = doc(db, "roadmaps", selectedSkill);
      const roadmapSnap = await getDoc(roadmapRef);

      if (roadmapSnap.exists()) {
        const data = roadmapSnap.data().steps || [];
        
        // Clear "Loading..." and render the data from Firebase
        roadmapContainer.innerHTML = data.map((item, index) => `
          <div class="step-card">
            <div class="step-header">
              <div class="step-num">${index + 1}</div>
              <h3>${item.title}</h3>
            </div>
            <div class="resource-grid">
              ${item.resources.map(res => `
                <div class="res-box res-${res.type}" onclick="recordView('${res.url}')">
                  <span class="res-type">${res.type}</span>
                  <span class="res-name">${res.name}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } else {
        roadmapContainer.innerHTML = `<p style="text-align:center; color:#64748b;">No roadmap found for "${selectedSkill}" in Firestore yet.</p>`;
      }
    } catch (error) {
      console.error("Error loading roadmap:", error);
      roadmapContainer.innerHTML = "<p>Error loading resources. Please try again.</p>";
    }
  }

  // 4. Toast and Tracking Logic
  function showToast(message) {
    const t = document.getElementById('toast');
    t.innerText = message; 
    t.className = "toast show success";
    setTimeout(() => { t.className = "toast"; }, 3000);
  }

  // Global function to record clicks and open links
  window.recordView = async (url) => {
    const user = auth.currentUser;
    if (user) {
      try {
        await updateDoc(doc(db, "users", user.uid), { resourcesViewed: increment(1) });
      } catch (e) {
        console.error("Failed to update resource count:", e);
      }
      window.open(url, '_blank');
    }
  };

  // Big Blue Button Logic
  document.getElementById('completeSkillBtn').addEventListener('click', async () => {
    const user = auth.currentUser;
    if (user) {
      // Maps the skill name to the correct progress field in your User document
      const fieldMapping = {
        "Cyber Security": "cyberProgress",
        "DSA": "dsaProgress",
        "Frontend": "frontendProgress"
      };
      
      const fieldName = fieldMapping[selectedSkill] || "generalProgress";

      try {
        await updateDoc(doc(db, "users", user.uid), { 
          [fieldName]: increment(20), 
          badges: increment(1) 
        });
        showToast("Awesome! Progress saved and badge earned! 🏆");
        document.getElementById('completeSkillBtn').disabled = true;
        document.getElementById('completeSkillBtn').innerText = "Step Completed!";
      } catch (e) {
        console.error("Update failed:", e);
      }
    }
  });

  // 5. Auth State Observer
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById('userNameDisplay').innerText = user.email.split('@')[0];
      document.getElementById('userInitial').innerText = user.email.charAt(0).toUpperCase();
      
      // Load the data only after we know the user is authenticated
      loadRoadmapFromFirestore();
    }
  });

  // Logout Logic
  document.getElementById('logoutBtn').addEventListener('click', () => { 
    signOut(auth).then(() => window.location.href = "login.html"); 
  });
</script>
