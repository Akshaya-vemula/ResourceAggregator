<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optern – Learning Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #e9eef3;
      height: 100vh;
      display: flex;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      width: 100%;
      display: flex;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    /* ===== SIDEBAR (Fixed & Consistent) ===== */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #0f4c75, #1b6ca8);
      color: #fff;
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand { text-align: center; margin-bottom: 20px; }
    .sidebar-logo { width: 60px; height: 60px; background: #fff; border-radius: 14px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
    .sidebar-logo img { width: 40px; }
    
    .user-profile { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255, 255, 255, 0.15); border-radius: 16px; margin: 20px 0; }
    .profile-icon { width: 42px; height: 42px; background: #fff; color: #0f4c75; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }

    .nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: rgba(255,255,255,0.7); font-size: 15px; }
    .nav a:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .logout { margin-top: auto; display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; cursor: pointer; font-family: inherit; }

    /* ===== MAIN RESOURCES AREA ===== */
    .main { flex: 1; padding: 40px; overflow-y: auto; }
    
    .back-btn { color: #0f4c75; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-block; margin-bottom: 20px; }
    .skill-title { font-size: 32px; color: #0f4c75; margin-bottom: 5px; }
    .skill-desc { color: #64748b; font-size: 15px; margin-bottom: 30px; }

    /* RESOURCE CARDS */
    .roadmap-container { display: flex; flex-direction: column; gap: 25px; }
    
    .step-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      transition: 0.3s;
    }

    .step-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .step-num { width: 35px; height: 35px; background: #0f4c75; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .step-header h3 { color: #1e293b; font-size: 20px; }

    .resource-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 15px;
    }

    .res-box {
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: 0.2s;
      border: 1px solid #f1f5f9;
    }

    /* Color coding different types */
    .res-video { background: #fff5f5; border-left: 4px solid #ff4d4d; }
    .res-doc { background: #f0fdf4; border-left: 4px solid #22c55e; }
    .res-practice { background: #eff6ff; border-left: 4px solid #3b82f6; }

    .res-box:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .res-type { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; }
    .res-name { font-size: 14px; font-weight: 600; color: #1e293b; }

    @media (max-width: 900px) { .resource-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="card">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo"><img src="logo.png" alt="🎓"></div>
        <h2>Optern</h2>
        <p>Learn. Build. Grow.</p>
        <div class="user-profile">
          <div class="profile-icon" id="userInitial">U</div>
          <div class="user-info"><span id="userNameDisplay">User</span></div>
        </div>
      </div>
      <nav class="nav">
        <a href="home.html">🏠 Home</a>
        <a href="skillspage.html">⚡ Skills</a>
        <a href="roadmap.html">🗺️ Roadmap</a>
        <a href="analytics.html">📊 Analytics</a>
      </nav>
      <button class="logout" id="logoutBtn">🚪 Logout</button>
    </aside>

    <main class="main">
      <a href="skillspage.html" class="back-btn">← Back to Skills</a>
      <h1 class="skill-title" id="skillName">Loading...</h1>
      <p class="skill-desc">Follow this structured path from basics to advanced practice.</p>

      <div class="roadmap-container" id="roadmapContent">
        </div>
    </main>
  </div>

  <script type="module">
    // DATA STRUCTURE FOR RESOURCES
    const resourceData = {
      "Frontend": [
        {
          step: "1. HTML5 Fundamentals",
          resources: [
            { type: "video", name: "One Shot (YouTube)", url: "https://www.youtube.com/results?search_query=html+one+shot" },
            { type: "doc", name: "W3Schools HTML Guide", url: "https://www.w3schools.com/html/" },
            { type: "practice", name: "Frontend Mentor", url: "https://www.frontendmentor.io/" }
          ]
        },
        {
          step: "2. CSS3 Styling",
          resources: [
            { type: "video", name: "Flexbox & Grid (Kevin Powell)", url: "https://www.youtube.com/@KevinPowell" },
            { type: "doc", name: "CSS Tricks Almanac", url: "https://css-tricks.com/almanac/" },
            { type: "practice", name: "CSS Battle", url: "https://cssbattle.dev/" }
          ]
        }
      ],
      "DSA": [
        {
          step: "1. Basic Arrays & Math",
          resources: [
            { type: "video", name: "Striver's A-Z Playlist", url: "https://www.youtube.com/playlist?list=PLgUwDviBIf0oF6QL8m22w1hIDC1vJ_8Hz" },
            { type: "doc", name: "GFG DSA Guide", url: "https://www.geeksforgeeks.org/data-structures/" },
            { type: "practice", name: "LeetCode Easy", url: "https://leetcode.com/problemset/all/?difficulty=EASY" }
          ]
        }
      ]
      // Add Cyber Security, Python, Java etc. here...
    };

    // LOGIC TO DISPLAY
    const urlParams = new URLSearchParams(window.location.search);
    const selectedSkill = urlParams.get('skill') || "Frontend";
    document.getElementById('skillName').innerText = selectedSkill;

    const roadmapContainer = document.getElementById('roadmapContent');
    const data = resourceData[selectedSkill] || [];

    roadmapContainer.innerHTML = data.map(item => `
      <div class="step-card">
        <div class="step-header">
          <div class="step-num">${item.step.split('.')[0]}</div>
          <h3>${item.step.split('.')[1]}</h3>
        </div>
        <div class="resource-grid">
          ${item.resources.map(res => `
            <a href="${res.url}" target="_blank" class="res-box res-${res.type}">
              <span class="res-type">${res.type}</span>
              <span class="res-name">${res.name}</span>
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');

    // FIREBASE LOGIC
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    const firebaseConfig = { apiKey: "AIzaSyCMs8aWDbSi39CYKoOvedmHsBin7TcxRZk", authDomain: "resource-aggregator-fa6b2.firebaseapp.com", projectId: "resource-aggregator-fa6b2", storageBucket: "resource-aggregator-fa6b2.firebasestorage.app", messagingSenderId: "484510576214", appId: "1:484510576214:web:49ea02c80a09f0e473d5f7" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "login.html";
      else {
        document.getElementById('userNameDisplay').innerText = user.email.split('@')[0];
        document.getElementById('userInitial').innerText = user.email.charAt(0).toUpperCase();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = "login.html");
    });
  </script>
</body>
</html>
